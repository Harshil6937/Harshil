<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="h1 text-center">Bento Grid Layout</div>

    <div class="container p-5" style="height: 70vh;">
      
      <div class="row h-75 mb-2">
        <div class="col-8 bg-primary me-2 ms-2 d-flex justify-content-center align-items-center rounded text-white">Large Items</div>
        <div class="col">
          <div class="row h-50">
            <div class="col bg-success me-2 mb-1  d-flex justify-content-center align-items-center rounded text-white">Small Item1</div>
          </div>
          <div class="row h-50">
            <div class="col bg-danger me-2  mt-1 d-flex justify-content-center align-items-center rounded text-white">Small Item2</div>
          </div>
        </div>
      </div>


      <div class="row h-25">
          <div class="col-4 bg-warning me-2 ms-2 d-flex justify-content-center align-items-center rounded text-white">Medium Item 1</div>        
          <div class="col-4 bg-info me-2 d-flex justify-content-center align-items-center rounded text-white">Medium Item 2</div>
          <div class="col bg-secondary d-flex justify-content-center align-items-center rounded text-white">Medium Item 3</div>
      </div>  
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
