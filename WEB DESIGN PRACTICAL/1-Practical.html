<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>
		*{
			box-sizing:border-box;
			margin: 0px;
		}
		.header{
			height: 10vh;
			width: 100%;
			
		}
		.main{
			height: 80vh;
			width: 100%;
			
		}
		.footer{
			height: 10vh;
			width: 100%;
			border: 2px solid blue;
			text-align: center;
			padding: 25px;
			font-size: 30px;
		}
		.left{
			float: left;
			height: 100%;
			width: 30%;
			border: 3px solid yellow;
		}
		.right{
			float: left;
			height: 100%;
			width:70%;
			border: 3px solid green;
		}
		.logo{
			height: 100%;
			width: 20%;
			float: left;
			font-size: 30px	;
			text-align: center;
			padding: 10px;
			border: 2px solid red;
		}
		.nav{
			height: 100%;
			width: 80%;
			float: left;
			font-size: 25px	;
			padding: 10px;
			border: 2px solid blue;
		}
		a{
			margin: 7px;
		}
		.box{
			height: 15%;
			width: 	90%;
			font-size: 30px;
			float: left;
			text-align: center;
			margin: 13px;
			padding: 30px;
			border: 1px solid black;
		}
		.right-box{
			height: 40%;
			width: 90%;
			border: 4px solid purple;
			margin: 35px;
			margin-left: 60px;
		}
		.child-box{
			height: 60%;
			width: 40%;
			float: left;
			margin: 35px;
			border: 3px dotted red;
		}
		.child-box-r{
			height: 60%;
			width: 25%;
			float: left;
			margin: 35px;
			border: 3px dotted red;
		}
	</style>
</head>
<body>

	<div class="header">
		<div class="logo">Logo Here</div>
		<div class="nav">
			<a href="#">Home</a>
			<a href="#">About</a>
			<a href="#">Contact</a>
		</div>
	</div>

	<div class="main">
		<div class="left">
			<div class="box">RESULT</div>
			<div class="box">APPLY</div>
			<div class="box">PLACEMENT</div>
			<div class="box">RECRUTMENT</div>
			<div class="box">NEWS</div>
		</div>
		<div class="right">
			<div class="right-box">
				<div class="child-box"></div>
				<div class="child-box"></div>
			</div>
			<div class="right-box">
				<div class="child-box-r"></div>
				<div class="child-box-r"></div>
				<div class="child-box-r"></div>
			</div>
		</div>
	</div>

	<div class="footer">Footer</div>
</body>
</html>
